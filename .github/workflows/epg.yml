name: 🤖 EPG Robot

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - '.github/workflows/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PYTHONUNBUFFERED: '1'

permissions:
  contents: write

jobs:
  epg:
    name: 📺 Обновить расписание
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 📦 Зависимости
        run: pip install aiohttp requests

      - name: 📁 Подготовка папок
        run: mkdir -p data docs

      - name: 🤖 Поисковой робот EPG
        run: python scripts/epg_robot.py
        timeout-minutes: 20

      - name: 🏗️ Сборка сайта
        run: python scripts/build.py

      - name: 📊 Статистика
        run: |
          python3 - <<'EOF'
          import json, os
          path = "data/schedule.json"
          if os.path.exists(path):
              d = json.load(open(path))
              progs = sum(len(v) for v in d.get("schedule", {}).values())
              chs   = len(d.get("channels", {}))
              print(f"📺 Каналов: {chs}")
              print(f"📋 Передач: {progs}")
              print(f"🕐 Обновлено: {d.get('updated','?')}")
          else:
              print("⚠️  schedule.json не найден")
          EOF

      - name: 🚀 Commit & Push
        run: |
          git config user.name  "EPG Robot 🤖"
          git config user.email "bot@oinktech.ltd"
          git add -A
          if git diff --staged --quiet; then
            echo "Нет изменений — пропускаем коммит"
          else
            git commit -m "🤖 EPG [$(date -u '+%Y-%m-%d %H:%M UTC')] $(python3 -c "import json; d=json.load(open('data/schedule.json')); print(f\"{len(d['channels'])} каналов, {sum(len(v) for v in d['schedule'].values())} передач\")")"
            git push
          fi
